<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- KC Motorcycles mark: red ground, white C behind, black K in front (as per signage logo) -->
  <rect width="64" height="64" rx="12" fill="#9B2335"/>
  <!-- White C: open to the right, sitting behind the K -->
  <path d="M 52 18 A 17 17 0 1 0 52 46" fill="none" stroke="#FFFFFF" stroke-width="11"/>
  <!-- Black K: overlapping the C's left side -->
  <path d="M6 8 H15 V26 L33 8 H45 L26 30 L46 56 H34 L15 36 V56 H6 Z" fill="#000000"/>
</svg>
